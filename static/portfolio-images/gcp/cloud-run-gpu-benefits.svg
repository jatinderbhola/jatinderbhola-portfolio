<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 140" width="360" height="140">
  <rect width="360" height="140" fill="#f8fafc" rx="8"/>
  <text x="180" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1e293b">Cloud Run + GPU (GA)</text>
  <rect x="12" y="38" width="80" height="88" fill="#e0e7ff" stroke="#6366f1" rx="4"/>
  <text x="52" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#4338ca">Pay per second</text>
  <text x="52" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#4f46e5">No idle cost</text>
  <rect x="100" y="38" width="80" height="88" fill="#d1fae5" stroke="#059669" rx="4"/>
  <text x="140" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#047857">Scale to zero</text>
  <text x="140" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#059669">GPU down when idle</text>
  <rect x="188" y="38" width="80" height="88" fill="#fef3c7" stroke="#d97706" rx="4"/>
  <text x="228" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#92400e">Under 5s startup</text>
  <text x="228" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">Fast cold start</text>
  <rect x="276" y="38" width="80" height="88" fill="#fee2e2" stroke="#dc2626" rx="4"/>
  <text x="316" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#991b1b">L4 no quota</text>
  <text x="316" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#b91c1c">Use --gpu 1</text>
</svg>
